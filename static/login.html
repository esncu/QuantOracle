<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantOracle | Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
</head>
<body class="has-background-light">
    <section class="section">
        <div class="container">
            <div class="columns is-centered">
                <div class="column is-4">
                    <div class="tabs is-centered">
                        <ul>
                            <li class="is-active" id="userTab"><a onclick="showUserLogin()">User</a></li>
                            <li id="adminTab"><a onclick="showAdminLogin()">Admin</a></li>
                        </ul>
                    </div>

                    <!-- User login + register -->
                    <div id="userSection" class="box">
                        <h1 class="title has-text-centered">User Login</h1>
                        <div id="loginMessage" class="notification is-hidden"></div>

                        <div class="field"><label class="label">Username</label>
                            <div class="control"><input id="userLoginUsername" class="input" type="text" placeholder="Username"></div>
                        </div>
                        <div class="field"><label class="label">Password</label>
                            <div class="control"><input id="userLoginPassword" class="input" type="password" placeholder="Password"></div>
                        </div>
                        <div class="field">
                            <div class="control"><button class="button is-primary is-fullwidth" onclick="doLogin()">Login</button></div>
                        </div>

                        <hr>
                        <h2 class="subtitle has-text-centered">Register</h2>

                        <div class="field"><label class="label">Username</label>
                            <div class="control"><input id="registerUsername" class="input" type="text" placeholder="Username"></div>
                        </div>
                        <div class="field"><label class="label">Password</label>
                            <div class="control"><input id="registerPassword" class="input" type="password" placeholder="Password"></div>
                        </div>
                        <div class="field">
                            <div class="control"><button class="button is-link is-fullwidth" onclick="doRegister()">Register</button></div>
                        </div>
                    </div>

                    <!-- Admin login -->
                    <div id="adminSection" class="box" style="display:none;">
                        <h1 class="title has-text-centered">Admin Login</h1>
                        <div id="adminMessage" class="notification is-hidden"></div>

                        <div class="field"><label class="label">Username</label>
                            <div class="control"><input id="adminUsername" class="input" type="text" placeholder="Admin username"></div>
                        </div>
                        <div class="field"><label class="label">Password</label>
                            <div class="control"><input id="adminPassword" class="input" type="password" placeholder="Admin password"></div>
                        </div>
                        <div class="field">
                            <div class="control"><button class="button is-danger is-fullwidth" onclick="doAdminLogin()">Admin Login</button></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function showUserLogin() {
            document.getElementById('userSection').style.display = 'block';
            document.getElementById('adminSection').style.display = 'none';
            document.getElementById('userTab').classList.add('is-active');
            document.getElementById('adminTab').classList.remove('is-active');
        }

        function showAdminLogin() {
            document.getElementById('userSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            document.getElementById('userTab').classList.remove('is-active');
            document.getElementById('adminTab').classList.add('is-active');
        }

        function setMessage(id, text, type = 'is-info') {
            const el = document.getElementById(id);
            el.className = `notification ${type}`;
            el.textContent = text;
            el.classList.remove('is-hidden');
        }

        async function doLogin() {
            const username = document.getElementById('userLoginUsername').value.trim();
            const password = document.getElementById('userLoginPassword').value.trim();
            if (!username || !password) {
                setMessage('loginMessage', 'Please enter username and password.', 'is-warning');
                return;
            }
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const text = await res.text();
                let data;
                try { data = JSON.parse(text); }
                catch { setMessage('loginMessage', `Server returned non-JSON (is main.py running?): ${text.slice(0,120)}`, 'is-danger'); return; }
                if (!res.ok) { setMessage('loginMessage', data.detail || 'Login failed.', 'is-danger'); return; }
                window.location.href = `dashboard.html?session=${data.session_id}`;
            } catch (err) {
                setMessage('loginMessage', `Network error: ${err.message}`, 'is-danger');
            }
        }

        async function doRegister() {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            if (!username || !password) {
                setMessage('loginMessage', 'Please fill in all fields.', 'is-warning');
                return;
            }
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const text = await res.text();
                let data;
                try { data = JSON.parse(text); }
                catch { setMessage('loginMessage', `Server returned non-JSON (is main.py running?): ${text.slice(0,120)}`, 'is-danger'); return; }
                if (!res.ok) { setMessage('loginMessage', data.detail || 'Registration failed.', 'is-danger'); return; }
                setMessage('loginMessage', 'Registered! Logging in...', 'is-success');
                document.getElementById('userLoginUsername').value = username;
                document.getElementById('userLoginPassword').value = password;
                await doLogin();
            } catch (err) {
                setMessage('loginMessage', `Network error: ${err.message}`, 'is-danger');
            }
        }

        async function doAdminLogin() {
            const username = document.getElementById('adminUsername').value.trim();
            const password = document.getElementById('adminPassword').value.trim();
            if (!username || !password) {
                setMessage('adminMessage', 'Please enter username and password.', 'is-warning');
                return;
            }
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password }),
                });
                const text = await res.text();
                let data;
                try { data = JSON.parse(text); }
                catch { setMessage('adminMessage', `Server returned non-JSON (is main.py running?): ${text.slice(0,120)}`, 'is-danger'); return; }
                if (!res.ok) { setMessage('adminMessage', data.detail || 'Login failed.', 'is-danger'); return; }
                window.location.href = `admin_dashboard.html?session=${data.session_id}`;
            } catch (err) {
                setMessage('adminMessage', `Network error: ${err.message}`, 'is-danger');
            }
        }
    </script>
</body>
</html>
