<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QuantOracle | Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <style>
        .status-box { width: 35px; height: 35px; border-radius: 4px; display: inline-block; cursor: pointer; transition: 0.2s; }
        .is-trained { background-color: #48c78e; }
        .is-untrained { background-color: #f14668; }
        .status-box:hover { opacity: 0.8; transform: scale(1.05); }
        .index-row { border-bottom: 1px solid #eee; padding: 15px 0; }
    </style>
</head>
<body class="has-background-light">
    <div id="topbar-container"></div>

    <section class="section">
        <div class="container">
            <div class="box p-6">
                <div class="columns is-mobile has-text-centered has-text-weight-bold grey-light">
                    <div class="column is-4 has-text-left">Index</div>
                    <div class="column">5M</div><div class="column">1H</div><div class="column">1D</div><div class="column">1W</div>
                    <div class="column is-narrow"><div style="width: 30px;"></div></div>
                </div>

                <div id="index-container">
                    <!-- Dynamically generated index rows will be inserted here -->
                </div>

                <div class="mt-5"><input class="input" type="text" placeholder="Track new index...."></div>
            </div>
        </div>
    </section>

    <script src="dashboard.js"></script>
    <script>
        async function insertTopbar() {
            try {
                const resp = await fetch('template.html');
                if (!resp.ok) throw new Error('Failed to load topbar template');
                const html = await resp.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const template = doc.querySelector('#topbar-template');
                if (!template) throw new Error('Topbar template not found');

                const topbarContent = template.content.cloneNode(true);
                document.getElementById('topbar-container').appendChild(topbarContent);
            } catch (error) {
                console.warn(error);
            }
        }

        insertTopbar();
    </script>
</body>
</html>
