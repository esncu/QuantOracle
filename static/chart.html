<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QuantOracle | Analysis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body class="has-background-light">
    <nav class="navbar is-dark">
        <div class="container">
            <div class="navbar-brand"><span class="navbar-item">QuantOracle</span></div>
            <div class="navbar-end"><a class="navbar-item" href="index.html">Logout</a></div>
        </div>
    </nav>

    <section class="section">
        <div class="container">
            <div class="box p-0 overflow-hidden">
                <div class="p-4 is-flex is-justify-content-between has-background-white">
                    <div>
                        <h2 class="title is-4 mb-0" id="indexTitle">Loading...</h2>
                        <span class="tag is-info is-light" id="timeTitle">Timeframe</span>
                    </div>
                    <div class="has-text-right">
                        <p class="is-size-7 has-text-grey">Session ID</p>
                        <p class="has-text-weight-bold" id="sessionTitle">---</p>
                    </div>
                </div>
                
                <div id="chart" style="height: 450px; width: 100%;"></div>

                <div class="p-4 has-background-white-bis">
                    <button class="button is-primary is-fullwidth" onclick="location.reload()">Click to update chart</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        const params = new URLSearchParams(window.location.search);
        document.getElementById('indexTitle').innerText = params.get('index') || 'No Index';
        document.getElementById('timeTitle').innerText = `Timeframe: ${params.get('time') || 'N/A'}`;
        document.getElementById('sessionTitle').innerText = params.get('session') || 'N/A';

        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#ffffff' }, textColor: '#333' },
            grid: { vertLines: { visible: false }, horzLines: { color: '#f0f0f0' } },
        });

        const series = chart.addCandlestickSeries({ upColor: '#48c78e', downColor: '#f14668' });
        
        // Static Fake Data
        series.setData([
            { time: '2026-04-20', open: 140.10, high: 145.00, low: 139.00, close: 143.20 },
            { time: '2026-04-21', open: 143.20, high: 148.50, low: 142.00, close: 147.10 },
            { time: '2026-04-22', open: 147.10, high: 149.00, low: 145.00, close: 146.50 },
            { time: '2026-04-23', open: 146.50, high: 155.00, low: 146.00, close: 153.20 }, // Predicted
        ]);

        series.setMarkers([{ time: '2026-04-23', position: 'aboveBar', color: '#209cee', shape: 'arrowDown', text: 'PREDICTED' }]);
        chart.timeScale().fitContent();
    </script>
</body>
</html>
