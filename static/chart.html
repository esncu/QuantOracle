<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QuantOracle | Analysis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body class="has-background-light">
    <div id="topbar-container"></div>

    <section class="section">
        <div class="container">
            <div class="box p-0 overflow-hidden">
                <div class="p-4 is-flex is-justify-content-between has-background-white">
                    <div style="width: 100%;">
                        <div style="display: grid; grid-template-columns: auto auto; justify-content: space-between; width: 100%;">
                            <h2 class="title is-4 mb-0" id="indexTitle">Loading...</h2>
                            <button class="button is-light guideBtn">quick guide</button>
                        </div>
                        <span class="tag is-info is-light" id="timeTitle">Timeframe</span>
                    </div>
                </div>

                <!-- AlphaVantage API key — for future live-pull functionality -->
                <div class="px-4 pb-3 has-background-white" id="apiKeyBanner">
                    <p class="is-size-7 has-text-grey mb-2">
                        To regenerate forecasts with live data, enter your AlphaVantage API key.
                        It is passed to the server for the request and <strong>never stored</strong>.
                    </p>
                    <div class="field has-addons mb-0">
                        <div class="control is-expanded">
                            <input id="chartApiKey" class="input is-small" type="password"
                                placeholder="AlphaVantage API key (optional)">
                        </div>
                    </div>
                </div>

                <div id="chart" style="height: 450px; width: 100%;"></div>

                <div class="p-4 has-background-white-bis">
                    <div class="buttons" style="gap:8px;">
                        <button id="refreshBtn" class="button is-info" style="flex:1" onclick="doRefresh()">
                            Refresh Data <span class="is-size-7 ml-1 has-text-weight-normal">(reuse model)</span>
                        </button>
                        <button id="regenBtn" class="button is-warning" style="flex:1" onclick="doRegen()">
                            Retrain Model <span class="is-size-7 ml-1 has-text-weight-normal">(full rebuild)</span>
                        </button>
                    </div>
                    <p id="actionStatus" class="is-size-7 has-text-grey mt-2" style="min-height:18px;"></p>
                </div>
            </div>
        </div>
    </section>

    <div id="guidePopup" style="position: fixed; z-index: 9999; width: 100%; height: 100%; display: none; grid-template-rows: 5% auto; top: 0; justify-content: center;">
        <button style="background-color: red; border: 0; color: white; font-weight: bold; cursor: pointer;" class="guideBtn">✕ Close</button>
        <img src="./images/guide.png" alt="Quick guide">
    </div>

    <script>
        const params   = new URLSearchParams(window.location.search);
        const session  = params.get('session');
        const index    = params.get('index')   || '';
        const time     = params.get('time')    || '';
        const dash_id  = params.get('dash_id') || '';
        const username = localStorage.getItem('qo_username') || 'user';
        const LS_KEY   = `qo_av_key_${username}`;

        document.getElementById('indexTitle').innerText = index || 'No Index';
        document.getElementById('timeTitle').innerText  = `Timeframe: ${time || 'N/A'}`;

        // ----------------------------------------------------------------
        // Chart
        // ----------------------------------------------------------------
        async function loadChart() {
            let payload;
            try {
                // FIX: relative URL, correct index+time from params
                const apiKey  = localStorage.getItem(LS_KEY) || '';
                const savedKey = document.getElementById('chartApiKey')?.value.trim() || apiKey;
                const keyParam = savedKey ? `&api_key=${encodeURIComponent(savedKey)}` : '';
                const didParam = dash_id  ? `&dash_id=${encodeURIComponent(dash_id)}`  : '';
                const res = await fetch(
                    `/api/chart/?session=${session}&action=GET&index=${encodeURIComponent(index)}&time=${encodeURIComponent(time)}${didParam}${keyParam}`,
                    { method: 'POST' }
                );
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                payload = await res.json();
            } catch (err) {
                const isPremium = (err.message.includes('502') || err.message.includes('rate limit'))
                    && (time === '5M' || time === '1H');
                const msg = isPremium
                    ? '5M and 1H charts require a premium AlphaVantage API plan.'
                    : `Failed to load chart: ${err.message}`;
                const cls = isPremium ? 'has-text-warning-dark' : 'has-text-danger';
                document.getElementById('chart').innerHTML =
                    `<p class="${cls} p-4">${msg}</p>`;
                return;
            }

            const rawCandles = (payload.data?.data || payload.data || []);
            rawCandles.sort((a,b) => parseInt(a.candle_close_timestamp) - parseInt(b.candle_close_timestamp));

            const candles = rawCandles.map(d => {
                const isFake = d.fake === "true";
                const o = parseFloat(d.open), cl = parseFloat(d.close);
                return {
                    time:  parseInt(d.candle_close_timestamp, 10),
                    open:  o, high: parseFloat(d.high),
                    low:   parseFloat(d.low), close: cl,
                    ...(isFake ? {
                        color:       cl >= o ? '#b04fff' : '#7c00e0',
                        wickColor:   cl >= o ? '#b04fff' : '#7c00e0',
                        borderColor: cl >= o ? '#b04fff' : '#7c00e0',
                    } : {}),
                };
            });

            const chart = LightweightCharts.createChart(document.getElementById('chart'), {
                layout: { background: { color: '#ffffff' }, textColor: '#333' },
                grid:   { vertLines: { visible: false }, horzLines: { color: '#f0f0f0' } },
                width:  document.getElementById('chart').clientWidth,
                height: 450,
            });

            const series = chart.addSeries(LightweightCharts.CandlestickSeries, {
                upColor:        '#48c78e', downColor:      '#f14668',
                borderUpColor:  '#48c78e', borderDownColor:'#f14668',
                wickUpColor:    '#48c78e', wickDownColor:  '#f14668',
            });
            series.setData(candles);

            // Purple background behind prediction candles using a Histogram overlay
            const fakeCandles = rawCandles.filter(d => d.fake === "true");
            if (fakeCandles.length) {
                try {
                    const bgSeries = chart.addSeries(LightweightCharts.HistogramSeries, {
                        color: 'rgba(140,0,255,0.12)',
                        priceScaleId: '',
                        lastValueVisible: false,
                        priceLineVisible: false,
                    });
                    // Use a very large value so it fills the pane height
                    bgSeries.setData(fakeCandles.map(d => ({
                        time:  parseInt(d.candle_close_timestamp, 10),
                        value: 1e10,
                    })));
                } catch(_) { /* older LightweightCharts — skip background */ }
            }

            // Forecast cone — upper (green) and lower (red) LineSeries
            const forecastData = payload.data?.forecast;
            if (forecastData?.upper?.length && forecastData?.lower?.length) {
                const toLineData = arr => arr.map(d => ({
                    time:  parseInt(d.candle_close_timestamp, 10),
                    value: parseFloat(d.value),
                })).sort((a, b) => a.time - b.time);

                const upperSeries = chart.addSeries(LightweightCharts.LineSeries, {
                    color:           'rgba(72, 199, 142, 0.55)',   // semi-transparent green
                    lineWidth:       2,
                    lineStyle:       1,   // dashed
                    priceLineVisible: false,
                    lastValueVisible: false,
                    crosshairMarkerVisible: false,
                });
                upperSeries.setData(toLineData(forecastData.upper));

                const lowerSeries = chart.addSeries(LightweightCharts.LineSeries, {
                    color:           'rgba(241, 70, 104, 0.55)',   // semi-transparent red
                    lineWidth:       2,
                    lineStyle:       1,   // dashed
                    priceLineVisible: false,
                    lastValueVisible: false,
                    crosshairMarkerVisible: false,
                });
                lowerSeries.setData(toLineData(forecastData.lower));
            }

            chart.timeScale().fitContent();
        }

        loadChart();

        // ----------------------------------------------------------------
        // Poll for pending tasks (REGEN/REFRESH running in background)
        // ----------------------------------------------------------------
        let _pollInterval = null;

        function startChartPolling() {
            if (_pollInterval) return;
            let countdown = 10;
            const el = () => document.getElementById('actionStatus');

            // Poll immediately once, then every 10s
            async function doPoll() {
                try {
                    const didParam = dash_id ? `&dash_id=${encodeURIComponent(dash_id)}` : '';
                    const apiKey   = localStorage.getItem(LS_KEY) || '';
                    const keyParam = apiKey ? `&api_key=${encodeURIComponent(apiKey)}` : '';
                    const res = await fetch(
                        `/api/chart/?session=${session}&action=GET&index=${encodeURIComponent(index)}&time=${encodeURIComponent(time)}${didParam}${keyParam}`,
                        { method: 'POST' }
                    );
                    if (!res.ok) return;
                    const data = await res.json();
                    const hasPreds = (data.data?.data || []).some(d => d.fake === 'true');
                    if (hasPreds) {
                        clearInterval(_pollInterval);
                        _pollInterval = null;
                        setActionStatus('Done. Reloading…');
                        setTimeout(() => location.reload(), 600);
                        return;
                    }
                } catch(_) {}
                // Reset countdown for next poll
                countdown = 10;
            }

            _pollInterval = setInterval(() => {
                countdown--;
                const e = el();
                if (e) e.textContent = `Training in progress — checking in ${countdown}s…`;
                if (countdown <= 0) doPoll();
            }, 1000);
        }

        // ----------------------------------------------------------------
        // Refresh / Regen actions
        // ----------------------------------------------------------------
        function setActionStatus(msg, isErr=false) {
            const el = document.getElementById('actionStatus');
            if (el) { el.textContent = msg; el.style.color = isErr ? '#f14668' : '#888'; }
        }

        async function chartAction(action) {
            const apiKey = localStorage.getItem(LS_KEY) || document.getElementById('chartApiKey')?.value.trim() || '';
            if (!apiKey) { setActionStatus('Enter your AlphaVantage API key above first.', true); return; }
            const btn = document.getElementById(action === 'REFRESH' ? 'refreshBtn' : 'regenBtn');
            if (btn) { btn.classList.add('is-loading'); btn.disabled = true; }
            setActionStatus(action === 'REFRESH' ? 'Fetching new data…' : 'Retraining model…');
            try {
                const keyParam = `&api_key=${encodeURIComponent(apiKey)}`;
                const didParam = dash_id ? `&dash_id=${encodeURIComponent(dash_id)}` : '';
                const res = await fetch(
                    `/api/chart/?session=${session}&action=${action}&index=${encodeURIComponent(index)}&time=${encodeURIComponent(time)}${didParam}${keyParam}`,
                    { method: 'POST' }
                );
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
                if (data.status === 'pending') {
                    setActionStatus('Task started - checking in 10s…');
                    startChartPolling();
                } else {
                    setActionStatus('Done. Reloading…');
                    setTimeout(() => location.reload(), 800);
                }
            } catch (err) {
                setActionStatus(`Error: ${err.message}`, true);
            } finally {
                if (btn) { btn.classList.remove('is-loading'); btn.disabled = false; }
            }
        }

        function doRefresh() { chartAction('REFRESH'); }
        function doRegen()   { chartAction('REGEN');   }

        // ----------------------------------------------------------------
        // Topbar
        // ----------------------------------------------------------------
        async function insertTopbar() {
            try {
                const resp = await fetch('template.html');
                if (!resp.ok) throw new Error('no template');
                const html = await resp.text();
                const doc  = new DOMParser().parseFromString(html, 'text/html');
                const tmpl = doc.querySelector('#topbar-template');
                if (!tmpl) throw new Error('template tag missing');
                document.getElementById('topbar-container').appendChild(tmpl.content.cloneNode(true));
            } catch {
                document.getElementById('topbar-container').innerHTML = `
                    <nav class="navbar is-dark">
                        <div class="container">
                            <div class="navbar-brand"><span class="navbar-item">QuantOracle</span></div>
                            <div class="navbar-end"><a class="navbar-item" href="login.html">Logout</a></div>
                        </div>
                    </nav>`;
            }
        }
        insertTopbar();

        // ----------------------------------------------------------------
        // Guide popup  — FIX: inverted toggle logic
        // ----------------------------------------------------------------
        let guideOpen = false;
        document.querySelectorAll('.guideBtn').forEach(btn => {
            btn.addEventListener('click', () => {
                guideOpen = !guideOpen;
                document.getElementById('guidePopup').style.display = guideOpen ? 'grid' : 'none';
            });
        });

        // Autoload + autosave API key using per-user key
        const _savedKey = localStorage.getItem(LS_KEY);
        if (_savedKey) document.getElementById('chartApiKey').value = _savedKey;
        document.getElementById('chartApiKey').addEventListener('change', () => {
            const v = document.getElementById('chartApiKey').value.trim();
            if (v) localStorage.setItem(LS_KEY, v);
        });
    </script>
</body>
</html>
