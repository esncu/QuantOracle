<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QuantOracle | Analysis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body class="has-background-light">
    <div id="topbar-container"></div>

    <section class="section">
        <div class="container">
            <div class="box p-0 overflow-hidden">
                <div class="p-4 is-flex is-justify-content-between has-background-white">
                    <div style="width: 100%;">
                        <div style="display: grid; grid-template-columns: auto auto; justify-content: space-between; width: 100%;">
                          <h2 class="title is-4 mb-0" id="indexTitle">Loading...</h2>
                          <input type="button" class="title is-4 mb-0 guideBtn" style="background-color: grey; padding: 2px; border: 0; border-radius: 2px;" value="quick guide"></input>
                        </div>
                        <span class="tag is-info is-light" id="timeTitle">Timeframe</span>
                    </div>
                </div>

                <div id="chart" style="height: 450px; width: 100%;"></div>

                <div class="p-4 has-background-white-bis">
                    <button class="button is-primary is-fullwidth" onclick="location.reload()">Click to update chart</button>
                </div>
            </div>
        </div>
    </section>
    <div id="guidePopup" style="position: fixed; z-index: 9999; width: 100%; height: 100%; display: none; grid-template-rows: 5% auto; top:0; justify-content:center;">
      <input type="button" value="X" style="background-color: red; padding: 2px; border: 0; border-radius: 2px; height: 100%; width: 100%;" class="guideBtn">
      <img src="./images/guide.png" alt="">
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      document.getElementById('indexTitle').innerText = params.get('index') || 'No Index';
      document.getElementById('timeTitle').innerText = `Timeframe: ${params.get('time') || 'N/A'}`;

      var json_test_data; 
      async function loadChart(){
        json_test_data = await loadData();
        console.log(json_test_data);
        const json_test_predicted_data = json_test_data.data.map(item => {
            if (item.time > '2026-03-31') {
                const isUp = item.close >= item.open;
                const predictedColor = isUp ? '#FFD700' : '#BF00FF'; // Gold for Up, Neon Purple for Down

                return {
                    ...item,
                    color: predictedColor,
                    wickColor: predictedColor,
                    borderColor: predictedColor,
                };
            }
            return item;
        });

        const chart = LightweightCharts.createChart(document.getElementById('chart'), {
            layout: { background: { color: '#ffffff' }, textColor: '#333' },
            grid: { vertLines: { visible: false }, horzLines: { color: '#f0f0f0' } },
        });

        // const series = chart.addCandlestickSeries({ upColor: '#48c78e', downColor: '#f14668' });
        const series = chart.addSeries(LightweightCharts.CandlestickSeries, { upColor: '#48c78e', downColor: '#f14668' });

        // load data into chart
        series.setData(json_test_data.data);
        series.setData(json_test_predicted_data);
        
        chart.timeScale().fitContent();
      }
      loadChart();

      async function insertTopbar() {
          try {
              const resp = await fetch('template.html');
              if (!resp.ok) throw new Error('Failed to load topbar template');
              const html = await resp.text();
              const parser = new DOMParser();
              const doc = parser.parseFromString(html, 'text/html');
              const template = doc.querySelector('#topbar-template');
              if (!template) throw new Error('Topbar template not found');

              const topbarContent = template.content.cloneNode(true);
              document.getElementById('topbar-container').appendChild(topbarContent);
          } catch (error) {
              console.warn(error);
              document.getElementById('topbar-container').innerHTML = `
                  <nav class="navbar is-dark">
                      <div class="container">
                          <div class="navbar-brand"><span class="navbar-item">QuantOracle</span></div>
                          <div class="navbar-end"><a class="navbar-item" href="index.html">Logout</a></div>
                      </div>
                  </nav>
              `;
          }
      }

      insertTopbar();

      async function loadData(){
          const res = await fetch(`http://localhost:8000/chart/?session=${params.get('session')}&action=GET&index=foo`);
          return await res.json();
      }

      const guideBtns = document.querySelectorAll('.guideBtn');
      var guide = false;
      guideBtns.forEach(btn =>{
        btn.addEventListener('click', (e)=>{
          if(guide)
            document.getElementById("guidePopup").style.display = "grid";
          else
            document.getElementById("guidePopup").style.display = "none";
          guide = !guide;
          console.log('a');
        });
      });

    </script>
  </body>
</html>
