<!DOCTYPE html>
<html lang="en">
<head>

    <title>QuantOracle | Topbar Template</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
</head>
<body>
    <template id="topbar-template">
        <nav class="navbar is-dark">
            <div class="container">
                <div class="navbar-brand">
                    <span class="navbar-item has-text-weight-bold has-text-white">QuantOracle</span>

                </div>
            </div>
        </nav>
    </template>
</body>
</html>
